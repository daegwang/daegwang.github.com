<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="google" content="notranslate" />
    <title>{% if page.title %}{{ page.title }} · {% endif %}Daegwang Jang</title>
    <link rel="stylesheet" href="/css/main.css" />
  </head>
  <body>
    <header class="header">
      <div class="logo">
        <a href="/blog/">
          <div>DAEGWANG</div>
          <div>JANG</div>
        </a>
      </div>
      <nav class="header-nav">
        <a href="/blog"{% if page.url == '/blog/' or page.url contains '/blog/' %} class="active"{% endif %}>Blog</a>
        <a href="/projects"{% if page.url == '/projects/' %} class="active"{% endif %}>Projects</a>
        <a href="/about"{% if page.url == '/about/' %} class="active"{% endif %}>About</a>
      </nav>
      <div class="nav-right">
        <a href="https://github.com/daegwang" target="_blank"
          ><img src="/images/github.png"
        /></a>
      </div>
    </header>
    <div class="content-container">
      {{ content }}
      <div class="footer">
        <div class="footer-link"></div>
        © 2026 Daegwang Jang. All rights reserved.
      </div>
    </div>
  </body>
</html>
